aid: big-heart-pet-brands
name: Big Heart Pet Brands
description: >-
  Big Heart Pet Brands was a producer and marketer of branded pet food and
  snacks with brands including Meow Mix, Milk-Bone, Kibbles 'n Bits, 9Lives,
  Natural Balance, Pup-Peroni, Gravy Train, Nature's Recipe, Canine Carry Outs,
  and Milo's Kitchen. Big Heart Pet Brands was acquired by The J.M. Smucker
  Company in 2015 and no longer operates as an independent entity.
